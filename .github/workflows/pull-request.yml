name: Pull Request

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint
    runs-on: blacksmith-2vcpu-ubuntu-2404
    if: "${{ !contains(github.event.pull_request.labels.*.name, 'autorelease: pending') }}"
    steps:
      - name: Enforce ASCII-only title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if printf '%s' "$PR_TITLE" | LC_ALL=C grep -qP '[^\x00-\x7F]'; then
            echo "::error::PR title contains non-ASCII characters. Use ASCII only (no emoji, smart quotes, em-dashes, etc.)."
            exit 1
          fi

      - name: Validate conventional commits
        # amannn/action-semantic-pull-request@v6.1.1
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            style
            refactor
            perf
            test
            build
            ci
            revert
          requireScope: false
          disallowScopes: |
            .+
          subjectPattern: '^#\d+ .+$'
          subjectPatternError: |
            PR title subject must start with a GitHub issue reference. Example:
              feat: #123 add boot timeline
              fix: #456 restore search
            Scopes are not permitted. See AGENTS.md for conventions.
          ignoreLabels: |
            dependencies

      - name: Check for linked issue in PR body
        if: "${{ github.event.pull_request.user.login != 'dependabot[bot]' }}"
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ]; then
            echo "::error::PR body is empty. Add a GitHub issue link such as 'Closes #<issue>' or 'Related to #<issue>'."
            exit 1
          fi

          # Strip HTML comments, fenced code blocks, inline code, strikethrough,
          # blockquotes, and indented code blocks.
          sanitized=$(printf '%s' "$PR_BODY" \
            | awk '
                function fence_marker(line, closing,    indent, body, char, i, suffix) {
                  match(line, /^ */)
                  indent = RLENGTH
                  if (indent > 3 || substr(line, indent + 1, 1) == "\t") {
                    return ""
                  }
                  body = substr(line, indent + 1)
                  char = substr(body, 1, 1)
                  if (char != "`" && char != "~") {
                    return ""
                  }
                  for (i = 1; i <= length(body) && substr(body, i, 1) == char; i++) {
                  }
                  if (i - 1 < 3) {
                    return ""
                  }
                  suffix = substr(body, i)
                  if (closing && suffix !~ /^[[:space:]]*$/) {
                    return ""
                  }
                  return char ":" i - 1
                }
                active_char != "" {
                  marker = fence_marker($0, 1)
                  split(marker, parts, ":")
                  if (parts[1] == active_char && parts[2] >= active_len) {
                    active_char = ""
                    active_len = 0
                  }
                  next
                }
                {
                  marker = fence_marker($0, 0)
                  split(marker, parts, ":")
                  if (parts[2] >= 3) {
                    active_char = parts[1]
                    active_len = parts[2]
                    next
                  }
                  print
                }
              ' \
            | perl -0pe 's/<!--.*?-->//gs' \
            | perl -0pe 's/(`+)(?:(?!\1).)*\1//gs' \
            | sed -E 's/~~[^~]*~~//g')
          sanitized=$(printf '%s' "$sanitized" \
            | awk '
                /^[[:space:]]*>/ {
                  in_blockquote = 1
                  next
                }
                in_blockquote && NF == 0 {
                  in_blockquote = 0
                  print
                  next
                }
                in_blockquote {
                  next
                }
                /^([[:space:]]{4,}|[[:space:]]*\t)/ && $0 !~ /^[[:space:]]{2,}([-+*]|[0-9]+[.)])[[:space:]]+/ {
                  next
                }
                {
                  print
                }
              ' || true)

          issue_ref='([A-Za-z0-9._-]+/[A-Za-z0-9._-]+)?#[1-9][0-9]*'
          link_phrase='(close[sd]?|fix(e[sd])?|resolve[sd]?|related[[:space:]]+to|blocks|partially[[:space:]]+satisfies)'

          if printf '%s' "$sanitized" | grep -qiE "(^|[^A-Za-z])${link_phrase}:?[[:space:]]+${issue_ref}([^0-9A-Za-z_]|$)"; then
            echo "Issue link found."
            exit 0
          fi

          echo "::error::PR body must contain a GitHub issue link (e.g. 'Closes #123' or 'Related to #123') outside code blocks, HTML comments, strikethrough, and blockquotes."
          exit 1

      - name: Compare title `!` with breaking-change markers
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          title_has_bang=false
          if echo "$PR_TITLE" | grep -qE '^[a-z]+(\([^)]*\))?!:'; then
            title_has_bang=true
          fi
          body_has_footer=false
          if printf '%s' "$PR_BODY" | grep -qE '^BREAKING[ -]CHANGE:'; then
            body_has_footer=true
          fi
          commit_has_footer=false
          if ! commit_messages="$(gh api --paginate "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/commits" --jq '.[].commit.message')"; then
            echo "::error::Failed to list PR commits while checking breaking-change markers."
            exit 1
          fi
          if printf '%s\n' "$commit_messages" | grep -qE '^BREAKING[ -]CHANGE:'; then
            commit_has_footer=true
          fi
          breaking_has_footer=false
          if [ "$body_has_footer" = true ] || [ "$commit_has_footer" = true ]; then
            breaking_has_footer=true
          fi
          if [ "$title_has_bang" = true ] && [ "$breaking_has_footer" = false ]; then
            echo "::error::PR title declares a breaking change (\`!\` in prefix) but neither the body nor PR commit messages include a \`BREAKING CHANGE:\` footer. Explain the break or drop the \`!\`."
            exit 1
          fi
          if [ "$breaking_has_footer" = true ] && [ "$title_has_bang" = false ]; then
            echo "::error::PR body or commit messages include a \`BREAKING CHANGE:\` footer but the title is missing the \`!\` marker. Add \`!\` to the type (e.g. \`feat!: #123 ...\`) so squash-merged commits carry the marker."
            exit 1
          fi
          echo "Breaking change markers are consistent."
